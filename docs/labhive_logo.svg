      <polygon points="-4,-15 4,-15 6,-22 -6,-22" fill="#E84560" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round"/>
      <polygon points="-4,-15 4,-15 6,-22 -6,-22" fill="#E84560" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(36)"/>
      <polygon points="-4,-15 4,-15 6,-22 -6,-22" fill="#E84560" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(72)"/>
      <polygon points="-4,-15 4,-15 6,-22 -6,-22" fill="#E84560" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(108)"/>
      <polygon points="-4,-15 4,-15 6,-22 -6,-22" fill="#E84560" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(144)"/>
      <polygon points="-4,-15 4,-15 6,-22 -6,-22" fill="#E84560" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(180)"/>
      <polygon points="-4,-15 4,-15 6,-22 -6,-22" fill="#E84560" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(216)"/>
      <polygon points="-4,-15 4,-15 6,-22 -6,-22" fill="#E84560" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(252)"/>
      <polygon points="-4,-15 4,-15 6,-22 -6,-22" fill="#E84560" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(288)"/>
      <polygon points="-4,-15 4,-15 6,-22 -6,-22" fill="#E84560" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(324)"/>
      <circle cx="0" cy="0" r="8" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
    </g>

    <!-- GEAR 3 â blue small, center -26,-130 -->
    <g transform="translate(-26,-130)">
      <circle cx="0" cy="0" r="13" fill="#2AABE4" stroke="#1A1A1A" stroke-width="1.8"/>
      <polygon points="-3,-13 3,-13 5,-20 -5,-20" fill="#2AABE4" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round"/>
      <polygon points="-3,-13 3,-13 5,-20 -5,-20" fill="#2AABE4" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(36)"/>
      <polygon points="-3,-13 3,-13 5,-20 -5,-20" fill="#2AABE4" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(72)"/>
      <polygon points="-3,-13 3,-13 5,-20 -5,-20" fill="#2AABE4" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(108)"/>
      <polygon points="-3,-13 3,-13 5,-20 -5,-20" fill="#2AABE4" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(144)"/>
      <polygon points="-3,-13 3,-13 5,-20 -5,-20" fill="#2AABE4" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(180)"/>
      <polygon points="-3,-13 3,-13 5,-20 -5,-20" fill="#2AABE4" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(216)"/>
      <polygon points="-3,-13 3,-13 5,-20 -5,-20" fill="#2AABE4" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(252)"/>
      <polygon points="-3,-13 3,-13 5,-20 -5,-20" fill="#2AABE4" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(288)"/>
      <polygon points="-3,-13 3,-13 5,-20 -5,-20" fill="#2AABE4" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(324)"/>
      <circle cx="0" cy="0" r="6" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
    </g>

    <!-- OVERLAP COLOR BLEED -->
    <polygon points="-69,-96 -56,-92 -56,-20 -69,-16" fill="#BB44FF" opacity="0.35"/>
    <polygon points="56,-92 69,-96 69,-16 56,-20"     fill="#88FF00" opacity="0.35"/>
    <polygon points="-54,-102 54,-102 69,-96 0,-136 -69,-96" fill="#FF6644" opacity="0.35"/>

    <!-- LabHive wordmark -->
    <text x="0" y="110" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="90" font-weight="700"
          fill="#F5F0DC">LabHive</text>

