    <circle cx="142" cy="-88" r="3" fill="#AAFFAA"/>
    <circle cx="118" cy="-64" r="3" fill="#88FF00"/>
    <circle cx="142" cy="-64" r="3" fill="#AAFFAA"/>
    <circle cx="118" cy="-52" r="3" fill="#88FF00"/>
    <circle cx="142" cy="-52" r="3" fill="#AAFFAA"/>
    <circle cx="118" cy="-40" r="3" fill="#88FF00"/>
    <circle cx="142" cy="-40" r="3" fill="#AAFFAA"/>
    <circle cx="118" cy="-30" r="3" fill="#88FF00"/>
    <circle cx="142" cy="-30" r="3" fill="#AAFFAA"/>

    <!-- TOP HEX â Mechanics / 3 Gears â coral -->
    <polygon points="0,-192 54,-162 54,-102 0,-72 -54,-102 -54,-162"
             fill="#7B2010" stroke="#FF6644" stroke-width="2.5"/>

    <!-- GEAR 1 â yellow large, center -14,-138 -->
    <g transform="translate(-14,-138)">
      <circle cx="0" cy="0" r="26" fill="#F5C518" stroke="#1A1A1A" stroke-width="1.8"/>
      <polygon points="-5,-26 5,-26 8,-37 -8,-37" fill="#F5C518" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round"/>
      <polygon points="-5,-26 5,-26 8,-37 -8,-37" fill="#F5C518" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(30)"/>
      <polygon points="-5,-26 5,-26 8,-37 -8,-37" fill="#F5C518" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(60)"/>
      <polygon points="-5,-26 5,-26 8,-37 -8,-37" fill="#F5C518" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(90)"/>
      <polygon points="-5,-26 5,-26 8,-37 -8,-37" fill="#F5C518" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(120)"/>
      <polygon points="-5,-26 5,-26 8,-37 -8,-37" fill="#F5C518" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(150)"/>
      <polygon points="-5,-26 5,-26 8,-37 -8,-37" fill="#F5C518" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(180)"/>
      <polygon points="-5,-26 5,-26 8,-37 -8,-37" fill="#F5C518" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(210)"/>
      <polygon points="-5,-26 5,-26 8,-37 -8,-37" fill="#F5C518" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(240)"/>
      <polygon points="-5,-26 5,-26 8,-37 -8,-37" fill="#F5C518" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(270)"/>
      <polygon points="-5,-26 5,-26 8,-37 -8,-37" fill="#F5C518" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(300)"/>
      <polygon points="-5,-26 5,-26 8,-37 -8,-37" fill="#F5C518" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round" transform="rotate(330)"/>
      <circle cx="0" cy="0" r="13" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
    </g>

    <!-- GEAR 2 â red medium, center 16,-110 -->
