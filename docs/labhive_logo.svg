    <!-- DNA strand 1 -->
    <path d="M118,-94 C108,-80 128,-66 118,-52 C108,-38 128,-30 118,-30" fill="none" stroke="#88FF00" stroke-width="2.5" stroke-linecap="round"/>
    <!-- DNA strand 2 -->
    <path d="M142,-94 C152,-80 132,-66 142,-52 C152,-38 132,-30 142,-30" fill="none" stroke="#AAFFAA" stroke-width="2.5" stroke-linecap="round"/>
