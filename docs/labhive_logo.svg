    <line x1="120" y1="-76" x2="140" y2="-76" stroke="#88FF00" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
    <line x1="118" y1="-64" x2="142" y2="-64" stroke="#88FF00" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="118" y1="-52" x2="142" y2="-52" stroke="#88FF00" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
    <line x1="120" y1="-40" x2="140" y2="-40" stroke="#88FF00" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="118" y1="-30" x2="142" y2="-30" stroke="#88FF00" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
    <!-- DNA node dots -->
